<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Invisible Caregiver Chat</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <style>
      body {
        margin: 0;
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        background: #f6f7f9;
        color: #111827;
      }

      .page {
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 24px;
        box-sizing: border-box;
      }

      .chat-shell {
        width: 100%;
        max-width: 820px;
        height: 82vh;
        background: #ffffff;
        border: 1px solid #e5e7eb;
        border-radius: 20px;
        box-shadow: 0 20px 50px rgba(15, 23, 42, 0.08);
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      .header {
        padding: 20px 24px;
        border-bottom: 1px solid #e5e7eb;
        background: #ffffff;
      }

      .header h1 {
        margin: 0;
        font-size: 20px;
        font-weight: 700;
      }

      .header p {
        margin: 6px 0 0;
        font-size: 14px;
        color: #6b7280;
      }

      .messages {
        flex: 1;
        overflow-y: auto;
        padding: 24px;
        display: flex;
        flex-direction: column;
        gap: 14px;
      }

      .message {
        max-width: 78%;
        padding: 12px 14px;
        border-radius: 16px;
        font-size: 15px;
        line-height: 1.5;
        white-space: pre-wrap;
      }

      .user {
        align-self: flex-end;
        background: #111827;
        color: #ffffff;
        border-bottom-right-radius: 4px;
      }

      .assistant {
        align-self: flex-start;
        background: #f3f4f6;
        color: #111827;
        border-bottom-left-radius: 4px;
      }

      .meta {
        margin-top: 8px;
        font-size: 12px;
        color: #6b7280;
      }

      .input-area {
        display: flex;
        gap: 10px;
        padding: 16px;
        border-top: 1px solid #e5e7eb;
        background: #ffffff;
      }

      input {
        flex: 1;
        border: 1px solid #d1d5db;
        border-radius: 999px;
        padding: 12px 16px;
        font-size: 15px;
        outline: none;
      }

      input:focus {
        border-color: #111827;
      }

      button {
        border: none;
        border-radius: 999px;
        padding: 12px 18px;
        background: #111827;
        color: #ffffff;
        font-size: 15px;
        cursor: pointer;
      }

      button:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }
    </style>
  </head>

  <body>
    <div class="page">
      <div class="chat-shell">
        <div class="header">
          <h1>Invisible Caregiver</h1>
          <p>
            Ask about today’s routine, medication, meals, sleep, hygiene, or
            safety.
          </p>
        </div>

        <div id="messages" class="messages">
          <div class="message assistant">
            You can ask things like: “How was Mom’s day today?” or “Did she take
            her medication?”
          </div>
        </div>

        <form id="chatForm" class="input-area">
          <input
            id="messageInput"
            type="text"
            placeholder="Ask a question..."
            autocomplete="off"
          />
          <button id="sendButton" type="submit">Send</button>
        </form>
      </div>
    </div>

    <script>
      const form = document.getElementById("chatForm");
      const input = document.getElementById("messageInput");
      const messages = document.getElementById("messages");
      const sendButton = document.getElementById("sendButton");

      function addMessage(text, type, meta = "") {
        const bubble = document.createElement("div");
        bubble.className = `message ${type}`;
        bubble.textContent = text;

        if (meta) {
          const metaNode = document.createElement("div");
          metaNode.className = "meta";
          metaNode.textContent = meta;
          bubble.appendChild(metaNode);
        }

        messages.appendChild(bubble);
        messages.scrollTop = messages.scrollHeight;
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();

        const message = input.value.trim();

        if (!message) {
          return;
        }

        addMessage(message, "user");
        input.value = "";
        sendButton.disabled = true;

        try {
          const response = await fetch("/api/chat", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({ message }),
          });

          const data = await response.json();

          if (data.answer) {
            addMessage(
              data.answer,
              "assistant",
              data.confidence ? `Confidence: ${data.confidence}` : "",
            );
          } else if (data.summary) {
            addMessage(data.summary, "assistant");
          } else {
            addMessage(JSON.stringify(data, null, 2), "assistant");
          }
        } catch (error) {
          addMessage("I could not reach the local model service.", "assistant");
        }

        sendButton.disabled = false;
        input.focus();
      });
    </script>
  </body>
</html>
